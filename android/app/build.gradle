plugins {
    id "com.android.application"
}

def defaultServerUrl = "https://luduo-arcade.onrender.com"
def providedServerUrl = providers.gradleProperty("serverUrl").orNull
def serverUrl = providedServerUrl == null || providedServerUrl.trim().isEmpty()
    ? defaultServerUrl
    : providedServerUrl.trim()

android {
    namespace "com.luduo.arcade"
    compileSdk 35

    defaultConfig {
        applicationId "com.luduo.arcade"
        minSdk 21
        targetSdk 35
        versionCode 2
        versionName "1.0.1"
        resValue "string", "server_url", serverUrl
    }
}
