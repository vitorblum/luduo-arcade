<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#090b10">
    <meta name="description" content="Luduo Arcade: minijogos online em dupla para Android.">
    <title>Luduo Arcade</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css?v=12">
  </head>
  <body>
    <div id="app" class="app">
      <section id="loginScreen" class="screen screen-login is-active" aria-labelledby="appTitle">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
          </div>
          <p class="kicker">minijogos online em dupla</p>
          <h1 id="appTitle">Luduo Arcade</h1>
        </div>

        <form id="loginForm" class="login-form" autocomplete="off">
          <label for="nameInput">Seu nome</label>
          <div class="field-row">
            <input id="nameInput" name="name" type="text" maxlength="18" inputmode="text" placeholder="Ex: Player01" required>
            <button type="submit">Entrar</button>
          </div>
          <p id="loginMessage" class="message" role="status"></p>
        </form>
      </section>

      <section id="homeScreen" class="screen screen-home" aria-labelledby="homeTitle">
        <header class="topbar">
          <div>
            <p class="kicker">Luduo Arcade</p>
            <h2 id="homeTitle">Arena online</h2>
          </div>
          <div class="player-chip">
            <span id="connectionDot" class="dot"></span>
            <span id="playerName">offline</span>
          </div>
        </header>

        <main class="home-grid">
          <section class="panel minigames-panel" aria-labelledby="gamesTitle">
            <div class="section-heading">
              <p class="kicker">minijogos</p>
              <h3 id="gamesTitle">Escolha a partida</h3>
            </div>
            <div id="gameList" class="game-list"></div>
          </section>

          <section class="panel lobby-panel" aria-labelledby="lobbyTitle">
            <div class="section-heading">
              <p class="kicker">jogadores</p>
              <h3 id="lobbyTitle">Encontrar por nome</h3>
            </div>

            <form id="challengeForm" class="challenge-form" autocomplete="off">
              <input id="targetInput" type="text" maxlength="18" placeholder="Nome do jogador">
              <button type="submit">Desafiar</button>
            </form>
            <button id="botMatchButton" type="button" class="secondary bot-match-button">Jogar com maquina</button>
            <button id="localMatchButton" type="button" class="secondary bot-match-button">Jogar neste celular</button>

            <div id="onlineList" class="online-list" aria-live="polite"></div>
            <p id="lobbyMessage" class="message" role="status"></p>
          </section>
        </main>
      </section>

      <section id="gameScreen" class="screen screen-game" aria-labelledby="gameTitle">
        <div class="game-hud">
          <button id="leaveGameButton" class="icon-button" type="button" aria-label="Sair da partida">
            <span aria-hidden="true">x</span>
          </button>
          <div class="scoreboard">
            <div>
              <span id="youLabel">Voce</span>
              <strong id="youScore">0</strong>
            </div>
            <div>
              <span id="speedLabel">Velocidade 1</span>
              <strong id="countdownLabel"></strong>
            </div>
            <div>
              <span id="opponentLabel">Rival</span>
              <strong id="opponentScore">0</strong>
            </div>
          </div>
        </div>

        <h2 id="gameTitle" class="sr-only">DuoPong</h2>
        <canvas id="duopongCanvas" width="720" height="1180"></canvas>
        <div id="controlZone" class="control-zone" aria-label="Area de controle">
          <div class="control-glow" aria-hidden="true"></div>
          <div class="control-thumb" aria-hidden="true"></div>
        </div>
      </section>
    </div>

    <div id="inviteModal" class="modal" hidden>
      <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="inviteTitle">
        <p class="kicker">convite</p>
        <h2 id="inviteTitle">DuoPong</h2>
        <p id="inviteText"></p>
        <div class="modal-actions">
          <button id="declineInviteButton" type="button" class="secondary">Recusar</button>
          <button id="acceptInviteButton" type="button">Aceitar</button>
        </div>
      </div>
    </div>

    <div id="resultModal" class="modal" hidden>
      <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
        <p class="kicker">resultado</p>
        <h2 id="resultTitle">Fim da partida</h2>
        <p id="resultText"></p>
        <div class="modal-actions result-actions">
          <button id="nextPhaseButton" type="button">Proxima fase</button>
          <button id="replayButton" type="button" class="secondary">Jogar novamente</button>
          <button id="resultMenuButton" type="button" class="secondary">Voltar ao menu</button>
        </div>
      </div>
    </div>

    <script src="/pontinhos.js?v=12" defer></script>
    <script src="/app.js?v=12" defer></script>
  </body>
</html>
